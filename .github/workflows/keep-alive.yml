name: Keep Bot Alive

on:
  schedule:
    # Har 5 daqiqada ishga tushadi
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot to keep it alive
        run: |
          curl -X GET https://worldskills-bot.onrender.com/health
          echo "✅ Bot pinged successfully!"
