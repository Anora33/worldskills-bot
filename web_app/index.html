<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldSkills Shanghai 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000; --bg-secondary: #0a0a0a; --bg-card: #111111;
            --text-primary: #ffffff; --text-secondary: #a0a0a0; --border: #222222;
            --accent: #ffffff; --success: #4CAF50; --warning: #FFC107; --error: #f44336;
            --gradient: linear-gradient(135deg, #ffffff 0%, #888888 100%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; overflow-x: hidden; position: relative; font-size: 14px;
        }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.08; }
        .raindrop { position: absolute; width: 1px; height: 15px; background: linear-gradient(to bottom, transparent, var(--accent)); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        .header { background: var(--gradient); color: #000; padding: 30px 20px; text-align: center; position: relative; z-index: 1; }
        .header h1 { font-size: 22px; margin-bottom: 5px; font-weight: 800; }
        .header p { opacity: 0.9; font-size: 12px; }
        .content { position: relative; z-index: 1; padding: 15px; padding-bottom: 90px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 5px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 2px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
        .nav-item.active { color: var(--text-primary); }
        .nav-icon { font-size: 20px; margin-bottom: 3px; }
        .nav-label { font-size: 10px; font-weight: 600; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>
    <div class="rain" id="rain"></div>
    <div class="header">
        <h1>🏆 WorldSkills Shanghai 2026</h1>
        <p id="userGreeting">Chet elga chiqish va portfolio</p>
    </div>
    <div class="content">
        <!-- Documents Section -->
        <div id="section-documents" class="section">
            <div class="card">
                <div class="card-title">📄 Rasmiy Hujjatlar (my.gov.uz)</div>
                <p style="color:var(--text-secondary);font-size:12px;">9 ta rasmiy hujjat ro'yxati...</p>
            </div>
        </div>
        <!-- Portfolio Section -->
        <div id="section-portfolio" class="section active">
            <div class="card">
                <div class="card-title">💼 Kasb Ishlari (Portfolio)</div>
                <p style="color:var(--text-secondary);font-size:12px;">Tanlangan kasb bo'yicha ish namunalari...</p>
                <div id="portfolioList"></div>
            </div>
        </div>
        <!-- Stats Section -->
        <div id="section-stats" class="section">
            <div class="card">
                <div class="card-title">📊 Umumiy Statistika</div>
                <p style="color:var(--text-secondary);font-size:12px;">Hujjatlar + Portfolio progress...</p>
            </div>
        </div>
    </div>
    <!-- ✅ 3 TA BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="showSection('section-documents')">
            <div class="nav-icon">📄</div>
            <div class="nav-label">Hujjatlar</div>
        </div>
        <div class="nav-item active" onclick="showSection('section-portfolio')">
            <div class="nav-icon">💼</div>
            <div class="nav-label">Ishlar</div>
        </div>
        <div class="nav-item" onclick="showSection('section-stats')">
            <div class="nav-icon">📊</div>
            <div class="nav-label">Statistika</div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
            createRain();
        });
        function createRain() {
            const rain = document.getElementById('rain');
            for(let i=0; i<40; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random()*100+'%';
                drop.style.animationDuration = (Math.random()*2+1)+'s';
                rain.appendChild(drop);
            }
        }
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
