<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldSkills Uzbekistan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 30px; font-size: 26px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading, .success, .error { display: none; text-align: center; padding: 40px 20px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { font-size: 80px; color: #4CAF50; }
        .error-icon { font-size: 60px; color: #f44336; margin-bottom: 20px; }
        .debug { 
            background: #f5f5f5; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 15px; 
            font-size: 11px; 
            font-family: monospace; 
            display: none;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Ro'yxatdan O'tish</h1>
        
        <form id="registerForm">
            <div class="form-group">
                <label>👤 Ism:</label>
                <input type="text" id="firstName" required placeholder="Ismingizni kiriting">
            </div>
            <div class="form-group">
                <label>👤 Familiya:</label>
                <input type="text" id="lastName" required placeholder="Familiyangizni kiriting">
            </div>
            <div class="form-group">
                <label>📱 Telefon:</label>
                <input type="tel" id="phone" required placeholder="+998901234567">
            </div>
            <div class="form-group">
                <label>🎓 Yo'nalish:</label>
                <select id="profession" required>
                    <option value="">Tanlang...</option>
                    <option value="Dasturlash">💻 Dasturlash</option>
                    <option value="Web texnologiyalar">💻 Web texnologiyalar</option>
                    <option value="Dizayn">🎨 Dizayn</option>
                    <option value="Mexanika">🔧 Mexanika</option>
                    <option value="Qurilish">🏗 Qurilish</option>
                    <option value="Oshpazlik">👨‍🍳 Oshpazlik</option>
                    <option value="Biznes">💼 Biznes</option>
                </select>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">✅ Ro'yxatdan o'tish</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Yuborilmoqda...</p>
        </div>
        
        <div class="success" id="success">
            <div class="success-icon">✅</div>
            <h2>Muvaffaqiyatli!</h2>
            <p>Ro'yxatdan o'tdingiz!</p>
        </div>
        
        <div class="error" id="error">
            <div class="error-icon">❌</div>
            <h2>Xatolik!</h2>
            <p id="errorMessage">-</p>
        </div>
        
        <div class="debug" id="debugInfo"></div>
    </div>

    <!-- JavaScript ni ulash -->
    <script src="js/apps.js"></script>
</body>
</html>
