<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldSkills Shanghai 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .content {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .upload-area {
            background: rgba(255,255,255,0.2);
            border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin: 15px 0;
        }
        .upload-area:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .file-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .file-info.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 WorldSkills Shanghai 2026</h1>
        <p>48-chi Jahon Kasb Chempionati</p>
    </div>
    
    <div class="content">
        <h2>📄 Hujjat Yuklash</h2>
        <p style="margin: 15px 0; font-size: 14px;">PDF faylingizni yuklang (Max 10 MB)</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 48px; margin-bottom: 10px;">📎</div>
            <div>PDF fayl tanlang</div>
        </div>
        
        <input type="file" id="fileInput" accept=".pdf,application/pdf" style="display: none;" onchange="handleFileSelect(event)">
        
        <div class="file-info" id="fileInfo">
            <div><b>Fayl:</b> <span id="fileName"></span></div>
            <div><b>Hajm:</b> <span id="fileSize"></span></div>
        </div>
        
        <button class="btn" id="uploadBtn" onclick="uploadFile()" disabled>📤 Yuklash</button>
    </div>

    <script>
        let selectedFile = null;
        
        // Telegram WebApp init
        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('❌ Faqat PDF fayllar!');
                e.target.value = '';
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                alert('❌ Max 10 MB!');
                e.target.value = '';
                return;
            }
            
            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('fileInfo').classList.add('active');
            document.getElementById('uploadBtn').disabled = false;
        }
        
        async function uploadFile() {
            if (!selectedFile) return;
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Yuklanmoqda...';
            
            try {
                const formData = new FormData();
                formData.append('telegramId', Telegram.WebApp.initDataUnsafe?.user?.id?.toString() || 'unknown');
                formData.append('docId', 'document_1');
                formData.append('file', selectedFile);
                
                const response = await fetch('/api/documents/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Hujjat yuklandi!');
                    document.getElementById('fileInfo').classList.remove('active');
                    btn.textContent = '📤 Yuklash';
                    btn.disabled = true;
                    selectedFile = null;
                } else {
                    alert('❌ Xatolik: ' + (result.error || 'Noma\'lum xatolik'));
                    btn.disabled = false;
                    btn.textContent = '📤 Yuklash';
                }
            } catch (err) {
                alert('❌ Upload xatosi: ' + err.message);
                btn.disabled = false;
                btn.textContent = '📤 Yuklash';
            }
        }
    </script>
</body>
</html>
