<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldSkills Uzbekistan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .profile { text-align: center; padding: 30px 0; }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
        }
        .name { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .profession { color: #666; margin-bottom: 20px; }
        .score {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            font-size: 18px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading, .success { display: none; text-align: center; padding: 20px; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { font-size: 60px; color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 WorldSkills Uzbekistan</h1>
        <p class="subtitle">Professional Bot</p>
        
        <div class="profile" id="profileSection" style="display: none;">
            <div class="avatar" id="avatar">👤</div>
            <div class="name" id="profileName">-</div>
            <div class="profession" id="profileProfession">-</div>
            <div class="score">🏆 <span id="profileScore">0</span> ball</div>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>👤 Ism:</label>
                <input type="text" id="firstName" required placeholder="Ismingizni kiriting">
            </div>
            
            <div class="form-group">
                <label>👤 Familiya:</label>
                <input type="text" id="lastName" required placeholder="Familiyangizni kiriting">
            </div>
            
            <div class="form-group">
                <label>📱 Telefon raqam:</label>
                <input type="tel" id="phone" required placeholder="+998901234567">
            </div>
            
            <div class="form-group">
                <label>🎓 Yo'nalishni tanlang:</label>
                <select id="profession" required>
                    <option value="">Tanlang...</option>
                    <option value="Dasturlash">💻 Dasturlash</option>
                    <option value="Web texnologiyalar">💻 Web texnologiyalar</option>
                    <option value="Dizayn">🎨 Dizayn</option>
                    <option value="Mexanika">🔧 Mexanika</option>
                    <option value="Qurilish">🏗 Qurilish</option>
                    <option value="Oshpazlik">👨‍🍳 Oshpazlik</option>
                    <option value="Biznes">💼 Biznes</option>
                </select>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">✅ Ro'yxatdan o'tish</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Yuklanmoqda...</p>
        </div>
        
        <div class="success" id="success">
            <div class="success-icon">✅</div>
            <h2>Muvaffaqiyatli!</h2>
            <p>Ro'yxatdan o'tdingiz!</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const user = tg.initDataUnsafe.user;
        const telegramId = user?.id;
        
        console.log('Telegram ID:', telegramId);
        console.log('User:', user);
        
        if (!telegramId) {
            alert("❌ Telegram ID topilmadi! Iltimos Telegram ichida oching.");
        } else {
            // Pre-fill form
            if (user.first_name) document.getElementById('firstName').value = user.first_name;
            if (user.last_name) document.getElementById('lastName').value = user.last_name;
        }
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            
            const data = {
                telegramId: telegramId,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                phone: document.getElementById('phone').value,
                profession: document.getElementById('profession').value
            };
            
            console.log('Sending:', data);
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('Response:', result);
                
                if (result.success) {
                    // Show success and reload to show profile
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                    
                    tg.showAlert("✅ Muvaffaqiyatli ro'yxatdan o'tdingiz!");
                    
                    // 2 seconds later, reload page to show profile
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                } else {
                    throw new Error(result.error || 'Xatolik');
                }
                
            } catch (error) {
                console.error('Error:', error);
                alert("❌ Xatolik: " + error.message);
                submitBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        });
    </script>
</body>
</html>
