<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldSkills Shanghai 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; padding: 20px; }
        .header { text-align: center; padding: 20px; background: linear-gradient(135deg,#fff,#888); color: #000; border-radius: 15px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg,#fff,#888); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cat-card { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 15px 10px; text-align: center; cursor: pointer; }
        .cat-icon { font-size: 28px; margin-bottom: 5px; }
        .cat-name { font-size: 11px; font-weight: 600; }
        .prof-list { display: flex; flex-direction: column; gap: 8px; }
        .prof-item { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 12px; cursor: pointer; }
        .prof-en { font-weight: 600; color: #4CAF50; font-size: 12px; }
        .prof-uz { font-size: 11px; color: #888; }
        .back-btn { background: none; border: none; color: #fff; font-size: 14px; cursor: pointer; margin-bottom: 10px; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 WorldSkills Shanghai 2026</h1>
        <p>48-chi Jahon Kasb Chempionati</p>
    </div>
    
    <div id="home" class="section active">
        <div class="card">
            <button class="btn" onclick="showCategories()">🎓 Kasbingizni Tanlang</button>
        </div>
    </div>
    
    <div id="categories" class="section">
        <button class="back-btn" onclick="showHome()">← Orqaga</button>
        <div class="card">
            <div class="cat-grid" id="catGrid"></div>
        </div>
    </div>
    
    <div id="professions" class="section">
        <button class="back-btn" onclick="showCategories()">← Orqaga</button>
        <div class="card">
            <div class="prof-list" id="profList"></div>
        </div>
    </div>

    <script>
        const categories = [
            {id:'cat1',icon:'🏭',name:'Ishlab chiqarish'},
            {id:'cat2',icon:'💻',name:'IT va Axborot'},
            {id:'cat3',icon:'🏗️',name:'Qurilish'},
            {id:'cat4',icon:'🚚',name:'Transport'},
            {id:'cat5',icon:'🎨',name:"San'at va Moda"},
            {id:'cat6',icon:'👥',name:'Xizmatlar'}
        ];
        
        const professions = {
            cat1: [{en:'Industrial Mechanics',uz:'Sanoat mexanikasi'},{en:'Mechatronics',uz:'Mexatronika'},{en:'CNC Turning',uz:'CNC tokarlik'},{en:'Welding',uz:'Payvandlash'},{en:'Electronics',uz:'Elektronika'}],
            cat2: [{en:'Mobile Apps',uz:'Mobil ilovalar'},{en:'Software Dev',uz:'Dasturiy ta\'minot'},{en:'Web Tech',uz:'Veb texnologiyalar'},{en:'Cyber Security',uz:'Kiberxavfsizlik'}],
            cat3: [{en:'Wall Tiling',uz:'Plitkalash'},{en:'Plumbing',uz:'Santexnika'},{en:'Electrical',uz:'Elektr'},{en:'Bricklaying',uz:'G\'isht terish'}],
            cat4: [{en:'Automobile',uz:'Avtomobil'},{en:'Logistics',uz:'Logistika'},{en:'Rail Vehicle',uz:'Temiryo\'l'}],
            cat5: [{en:'Jewellery',uz:'Zargarlik'},{en:'Fashion',uz:'Moda'},{en:'Graphic Design',uz:'Grafik dizayn'}],
            cat6: [{en:'Cooking',uz:'Oshpazlik'},{en:'Hairdressing',uz:'Sartaroshlik'},{en:'Health Care',uz:'Sog\'liqni saqlash'}]
        };
        
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showHome() { showSection('home'); }
        function showCategories() {
            document.getElementById('catGrid').innerHTML = categories.map(c => 
                '<div class="cat-card" onclick="showProfessions(\''+c.id+'\')"><div class="cat-icon">'+c.icon+'</div><div class="cat-name">'+c.name+'</div></div>'
            ).join('');
            showSection('categories');
        }
        function showProfessions(catId) {
            const profs = professions[catId] || [];
            document.getElementById('profList').innerHTML = profs.map(p => 
                '<div class="prof-item" onclick="selectProfession(\''+p.uz+'\')"><div class="prof-en">'+p.en+'</div><div class="prof-uz">'+p.uz+'</div></div>'
            ).join('');
            showSection('professions');
        }
        function selectProfession(uz) {
            alert('✅ '+uz+' tanlandi!\n\nAdmin\'ga xabar yuborildi.');
            showHome();
        }
    </script>
</body>
</html>
